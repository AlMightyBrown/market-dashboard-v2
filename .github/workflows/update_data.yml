name: Update Market Data

on:
  schedule:
    # Runs at 06:00 UTC daily (adjust to your preferred timezone)
    # 06:00 UTC = 18:00 HKT | 19:00 NZST (winter) / 18:00 NZDT (summer)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json
          git stash
          git pull --rebase origin main
          git stash pop
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
